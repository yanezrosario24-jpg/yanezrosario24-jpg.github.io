<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTPI - Inicio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: #0A1F44;
    color: white;
    overflow-x: hidden;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    padding: 60px;
    position: relative;
}

/* FONDO DIFUMINADO */
.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: url('img/fondobtpi1.jpg') center/cover no-repeat;
    filter: brightness(0.4);
    z-index: 0;
}

/* CONTENIDO */
.content {
    position: relative;
    z-index: 2;
    max-width: 550px;
    animation: aparecer 1s ease forwards;
    opacity: 0;
    transform: translateY(30px);
}

.content h1 {
    font-family: 'Playfair Display', serif;
    font-size: 55px;
    margin-bottom: 15px;
}

.content p {
    font-size: 18px;
    line-height: 1.7;
    opacity: 0.9;
}

/* BOTÓN */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: white;
    color: #0A1F44;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #A7D8FF;
}

/* CARD IMAGEN */
.card {
    position: relative;
    z-index: 2;
    width: 420px;
    height: 420px;
    border-radius: 20px;
    overflow: hidden;
    border: 3px solid rgba(255,255,255,0.5);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: aparecer 1s ease forwards;
    opacity: 0;
    transform: translateY(30px);
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ANIMACIÓN */
@keyframes aparecer {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* RESPONSIVE */
@media (max-width: 900px) {
    .hero {
        flex-direction: column;
        text-align: center;
        gap: 30px;
    }

    .card {
        width: 300px;
        height: 300px;
    }
}
</style>
</head>

<body>

<section class="hero">

    <div class="content">
        <h1>Nosotros somos BTPI</h1>
        <p>La sección de 12° de BTPI forma a estudiantes en el área de informática, fortaleciendo habilidades en programación, redes y tecnología. Es la etapa final del bachillerato técnico, enfocada en preparar a los jóvenes para la universidad y el mundo laboral.

        </p>

        <a href="areas.html" class="btn">Ver Áreas</a>
    </div>

    <div class="card">
        <img src="img/fondobtpi.jpg" alt="BTPI">
    </div>

</section>

</body>
</html>
