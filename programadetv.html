<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desde el Colegio - BTPI</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: #0A1F44;
    color: white;
}

/* TÍTULO */
header {
    text-align: center;
    padding: 50px 20px 10px;
}

header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 50px;
}

header p {
    opacity: 0.8;
    margin-top: 10px;
}

/* SECCIONES */
.section {
    padding: 40px;
}

.section h2 {
    text-align: center;
    font-size: 30px;
    margin-bottom: 30px;
    font-family: 'Playfair Display', serif;
}

/* GRID GENERAL */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    max-width: 1000px;
    margin: auto;
}

/* 🔥 PRESENTADORES GRID */
.presentadores-grid {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    align-items: flex-start;
}

/* 🔥 TARJETA PRESENTADOR (TAMAÑO PERFECTO) */
.presentador {
    width: 200px;
    border-radius: 18px;
    overflow: hidden;
    background: rgba(255,255,255,0.06);
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    transition: 0.3s;
}

.presentador:hover {
    transform: translateY(-8px);
}

/* IMAGEN */
.presentador img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    display: block;
}

/* NOMBRE */
.presentador h3 {
    padding: 12px;
    font-size: 18px;
    font-family: 'Playfair Display', serif;
    text-align: center;
}

/* TARJETAS GRUPO */
.card {
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 15px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
}

/* RESPONSIVE */
@media (max-width: 600px) {
    header h1 {
        font-size: 36px;
    }
}
</style>
</head>

<body>

<header>
    <h1>Desde el Colegio</h1>
    <p>Programa supervisado y anteriormente dirigido por estudiantes de 12° BTPI</p>
</header>

<!-- PRESENTADORES -->
<section class="section">
    <h2>Presentadores</h2>

    <div class="presentadores-grid">

        <div class="presentador">
            <img src="img/presentador1.jpg" alt="Presentador 1">
            <h3>Presentadora</h3>
        </div>

        <div class="presentador">
            <img src="img/presentador2.jpg" alt="Presentador 2">
            <h3>Presentador </h3>
        </div>
		
		<div class="presentador">
            <img src="img/presentador3.jpg" alt="Presentador 3">
            <h3>Presentadora</h3>
        </div>
		
		<div class="presentador">
            <img src="img/presentador4.jpg" alt="Presentador 4">
            <h3>Presentadora</h3>
        </div>

    </div>
</section>

<!-- FOTOS -->
<section class="section">
    <h2>Fotos del Grupo</h2>

    <div class="grid">

        <div class="card">
            <img src="img/aniversario.jpg" alt="Grupo 1">
            <h3>Aniversario Desde el colegio</h3>
        </div>

        <div class="card">
            <img src="img/grupo2.jpg" alt="Grupo 2">
            <h3>Graduacion 2025</h3>
        </div>
         
        <div class="card">
            <img src="img/foto.jpg" alt="Grupo 3">
            <h3>Equipo BTPI</h3>
        </div>

    </div>
</section>

</body>
</html>
